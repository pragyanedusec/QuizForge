<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <meta name="description" content="QuizForge — A scalable, multi-tenant Quiz-as-a-Service platform. Upload PDFs, extract questions, and deliver randomized quizzes." />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <title>QuizForge — Quiz-as-a-Service</title>
    <!-- Cache buster: forces hard reload if app version changes -->
    <script>
      (function() {
        var APP_VERSION = '2.1.0';
        var stored = localStorage.getItem('qf_app_version');
        if (stored !== APP_VERSION) {
          localStorage.setItem('qf_app_version', APP_VERSION);
          // Only reload if this isn't already a reload (prevents infinite loop)
          if (!sessionStorage.getItem('qf_reloaded')) {
            sessionStorage.setItem('qf_reloaded', '1');
            window.location.reload(true);
          }
        } else {
          sessionStorage.removeItem('qf_reloaded');
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
